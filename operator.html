<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f3d4d4;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background: #0d022c;
            padding: 20px;
            border-radius: 15px;
            width: 340px;
        }

        .display {
            width: 100%;
            height: 60px;
            font-size: 22px;
            text-align: right;
            padding: px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #dcdcdc;
            transition: 0.2s;
        }

        .equal {
            background: #0d0342;
            color: white;
        }

        .equal:hover {
            background: #0a0a0a;
        }

        .wide {
            grid-column: span 2;
        }

    </style>
</head>
<body>

<div class="calculator">

    <input type="text" id="display" class="display">

    <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="appendValue('%')">%</button>
        <button onclick="appendValue('/')">÷</button>
        <button onclick="appendValue('*')">×</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('-')">−</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('+')">+</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="wide" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>

        <button onclick="appendValue('>')">></button>
        <button onclick="appendValue('<')"><</button>
        <button onclick="appendValue('>=')">>=</button>
        <button onclick="appendValue('<=')"><=</button>

        <button onclick="appendValue('+=')">+=</button>
    </div>

</div>
<script>

function appendValue(value) {
    document.getElementById("display").value += value;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function calculate() {

    let expression = document.getElementById("display").value.trim();
    let result;

    let match = expression.match(/^(-?\d+\.?\d*)([+\-*/%><=]{1,2})(-?\d+\.?\d*)$/);

    if (!match) {
        result = "Invalid Input";
    } else {

        let firstNumber = parseFloat(match[1]);
        let operator = match[2];
        let secondNumber = parseFloat(match[3]);

        switch (operator) {
            case '+':
                result = firstNumber + secondNumber;
                break;

            case '-':
                result = firstNumber - secondNumber;
                break;

            case '*':
                result = firstNumber * secondNumber;
                break;

            case '/':
                result = secondNumber !== 0 ? firstNumber / secondNumber : "Cannot divide by 0";
                break;

            case '%':
                result = firstNumber % secondNumber;
                break;

            case '>':
                result = firstNumber > secondNumber;
                break;

            case '<':
                result = firstNumber < secondNumber;
                break;

            case '==':
                result = firstNumber == secondNumber;
                break;

            case '!=':
                result = firstNumber != secondNumber;
                break;
            default:
                result = "Unsupported Operator";
        }
    }

    document.getElementById("display").value = result;
    console.log("Expression:", expression);
    console.log("Result:", result);
}

</script>

</body>
</html>
