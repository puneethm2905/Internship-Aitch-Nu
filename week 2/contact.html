<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Archival Solutions - IoT Experts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
            </ul>
        </nav>
    </header>
    
    <section class="hero">
        <h1>Start Your IoT Project</h1>
        <p>Get free consultation from Bangalore's IoT specialists</p>
    </section>

    <section>
        <form class="contact-form" action="#" method="post">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Business Email</label>
            <input type="email" id="email" name="email" required>
            
            <label for="service">IoT Service Required</label>
            <select id="service" name="service">
                <option value="circuit">Circuit Design</option>
                <option value="pcb">PCB Design</option>
                <option value="firmware">Embedded Firmware</option>
                <option value="prototype">Prototyping</option>
            </select>
            
            <label for="project">Project Details</label>
            <textarea id="project" name="project" rows="6" required 
                      placeholder="Describe your IoT project requirements..."></textarea>
            
            <button type="submit">Request Quote</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Archival Solutions. <a href="index.html">Home</a></p>
    </footer>
</body>
</html>
