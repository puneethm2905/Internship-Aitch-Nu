<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Registration Form</title>
</head>
<body>
    <center><h1>Student Registration Form</h1></center>
    <form>
            <fieldset><legend><b>Personal Details</b></legend>
            
            <p>
                <label for="fullname">Full Name *:</label>
                <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="first name">
                <input type="text" id="fullname" name="fullname"  minlength="2" maxlength="50" placeholder="last name">
            </p>
            
            <p>
                <label for="mobile">Mobile Number *:</label>
                <input type="tel" id="mobile" name="mobile" required pattern="[0-9]{10}" maxlength="10" title="Enter 10-digit number">
            </p>
            
            <p>
                <label for="dob">Date of Birth *:</label>
                <input type="date" id="dob" name="dob" required max="2010-01-01">
            </p>
            
            <p>
                <label>Gender *:</label>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label>
            </p>
         <p>
                <label for="address">Address:</label><br>
                <textarea id="address" name="address" rows="4" cols="50" maxlength="200"></textarea>
            </p>
            
            <p>
                <label for="photo">Upload Student Photo:</label><br><br>
                <input type="file" id="photo" name="photo" accept="image/*">
            </p></fieldset>
           <fieldset>
            <legend><b>Academic Details</b></legend>
            
            <p>
                <label for="studentId">College Name *:</label>
                <input type="text" id="studentId" name="studentId" required>
            </p>
             <p>
                <label for="course">Course *:</label>
                <select id="course" name="course" required>
                    <option value="">--Select Course--</option>
                    <option value="cs">Computer Science</option>
                    <option value="cybersec">Cybersecurity</option>
                    <option value="ml">Machine Learning</option>
                    <option value="healthtech">Healthcare Tech</option>
                </select>
            </p>
            
            <p>
                <label for="year">Academic Year *:</label>
                <select id="year" name="year" required>
                    <option value="">--Select Year--</option>
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </p>
            
            <p>
                <label for="cgpa">Current CGPA:</label>
                <input type="number" id="cgpa" name="cgpa" min="0" max="10" step="0.01">
            </p>
            
            <p>
                <label>Skills Known:</label><br>
                <input type="checkbox" id="python" name="skills" value="python">
                <label for="python">Python</label><br>
                <input type="checkbox" id="javascript" name="skills" value="javascript">
                <label for="javascript">JavaScript</label><br>
                <input type="checkbox" id="react" name="skills" value="react">
                <label for="react">React</label><br>
                <input type="checkbox" id="mongodb" name="skills" value="mongodb">
                <label for="mongodb">MongoDB</label>
            </p>
        </fieldset>
            <fieldset><legend><b>Security</b></legend>
            <p>
                <label for="email">Email Address *:</label><br>
                <input type="email" id="email" name="email" required>
            </p>
            
            <p>
                <label for="password">Password *:</label>
                <input type="password" id="password" name="password" required minlength="8">
                 <label for="confirmpassword">Confirm Password *:</label>
                <input type="password" id="confirmpassword" name="confirmpassword" required minlength="8">
            </p><br>  
            </fieldset>
            <br><br>
            <input type="checkbox">
            <label>Accept Terms and Coditions</label><br><br>
            
            <div>
            <button type="submit">Submit Registration</button>
            <button type="reset">Reset Form</button>
            </div>
    </form>
</body>
</html>
