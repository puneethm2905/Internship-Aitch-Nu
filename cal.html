<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple JS Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .calculator-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        select#operator {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            transition: border-color 0.3s ease;
        }

        select#operator:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: black;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
            font-size: 24px;
            font-weight: 700;
            color: #333;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 480px) {
            .calculator-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-card">
        <h2>Simple Calculator</h2>
        <input type="number" id="num1" placeholder="First number" step="any">
        <input type="number" id="num2" placeholder="Second number" step="any">
        <select id="operator">
            <option value="">Select Operator</option>
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">×</option>
            <option value="/">÷</option>
            <option value="%">%</option>
            <option value="**">^</option>
        </select>
        <br><br>
        <button onclick="calculate()">Calculate</button>
        <div id="result"></div>
    </div>

    <script>
        function calculate() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const operator = document.getElementById('operator').value;
            let result;

            console.log(`Input: ${num1} ${operator} ${num2}`);

            if (isNaN(num1) || isNaN(num2)) {
                console.error('Error: Invalid numbers entered');
                document.getElementById('result').innerHTML = 'Please enter valid numbers';
                return;
            }

            switch (operator) {
                case '+':
                    result = num1 + num2; 
                    console.log("Addition result: " + result); 
                    break;
                case '-':
                    result = num1 - num2;  
                    console.log("Subtraction result: " + result);
                    break;
                case '*':
                    result = num1 * num2;  
                    console.log("Multiplication result: " + result);
                    break;
                case '/':
                    if (num2 === 0) {
                        console.error('Error: Division by zero');
                        document.getElementById('result').innerHTML = 'Error: Division by zero';
                        return;
                    }
                    result = num1 / num2;  
                    console.log("Division result: " + result);
                    break;
                case '%':
                    if (num2 === 0) {
                        console.error('Error: Modulus by zero');
                        document.getElementById('result').innerHTML = 'Error: Modulus by zero';
                        return;
                    }
                    result = num1 % num2; 
                    console.log("Modulus result: " + result);
                    break;
                case '**':
                    result = num1 ** num2;  
                    console.log("Exponentiation result: " + result);
                    break;
                case '&&':Boolean();
                
                default:
                    console.error('Error: No operator selected');
                    document.getElementById('result').innerHTML = 'Please select an operator';
                    return;
            }

            console.log(`Final result: ${result}`);  
            document.getElementById('result').innerHTML = `Result: ${result}`;
        }
    </script>
</body>
</html>
